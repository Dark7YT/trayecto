# =============================================================================
# CI del frontend: typecheck + build de producción + lint.
#
# Vercel hace su propio build automáticamente en cada push, pero este workflow
# corre primero — si rompe, el PR queda bloqueado y Vercel no llega a deployar.
# =============================================================================

name: trayecto-web · CI

on:
  push:
    branches: [master]
    paths:
      - "trayecto-web/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "trayecto-web/**"
      - ".github/workflows/web.yml"

concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./trayecto-web
    env:
      # Vars públicas (NEXT_PUBLIC_*) que el build necesita para inlinearlas
      # en el bundle. Valores dummy — el bundle generado en CI nunca se sirve.
      NEXT_PUBLIC_API_URL: https://api.example.com
      NEXT_PUBLIC_WS_URL: wss://api.example.com/ws
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ci-recaptcha-key
      NEXT_PUBLIC_IMGBB_API_KEY: ci-imgbb-key
      # Serwist usa webpack — al activarlo emitimos el SW y verificamos que compila.
      SERWIST_SUPPRESS_TURBOPACK_WARNING: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: trayecto-web/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
