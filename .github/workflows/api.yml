# =============================================================================
# CI del backend: compila, corre tests (módulos + dominio + ArchUnit) y verifica
# que la imagen Docker buildea. Se ejecuta en cada push a main y en cada PR.
#
# NO deploya — Render hace auto-deploy directo de su lado al detectar el push
# a main. Este workflow es la red de seguridad: si los tests fallan, Render
# igual buildearía, pero como el PR no se mergea hasta verde, los rompimientos
# se detectan antes del deploy.
# =============================================================================

name: trayecto-api · CI

on:
  push:
    branches: [main]
    paths:
      - "trayecto-api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "trayecto-api/**"
      - ".github/workflows/api.yml"

# Cancela runs previos del mismo branch/PR — evita gastar minutos en commits
# rápidamente sobrescritos.
concurrency:
  group: api-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./trayecto-api
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          # Cache de ~/.m2 — la primera corrida tarda ~5min descargando deps,
          # las siguientes solo el delta.
          cache: maven

      - name: Run tests + module verification
        run: ./mvnw -B verify
        env:
          # ArchUnit y ModularityTests no tocan BD, así que basta con perfil dev
          # con valores dummy. Si en futuro agregamos integration tests que
          # toquen Postgres, hay que sumar TestContainers acá.
          SPRING_PROFILES_ACTIVE: dev
          JWT_SECRET: ci-only-secret-32-chars-minimum-padding

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: trayecto-api/target/surefire-reports/
          retention-days: 7

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./trayecto-api
          file: ./trayecto-api/Dockerfile
          push: false
          # Cache de capas en GitHub Actions cache — drásticamente reduce el
          # tiempo de build entre runs (de ~5min a ~1min con cache caliente).
          cache-from: type=gha
          cache-to: type=gha,mode=max
