spring:
  application:
    name: trayecto-api
  config:
    # Carga .env como properties si existe (dev local). En prod (Render) no existe el archivo,
    # `optional:` evita error, y las env vars del SO siempre toman precedencia.
    import: "optional:file:.env[.properties]"
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc.lob.non_contextual_creation: true
        format_sql: false
  flyway:
    enabled: false
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true
  mail:
    host: ${BREVO_SMTP_HOST:smtp-relay.brevo.com}
    port: ${BREVO_SMTP_PORT:587}
    username: ${BREVO_SMTP_USER:}
    password: ${BREVO_SMTP_KEY:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.ssl.protocols: TLSv1.2 TLSv1.3
      mail.smtp.ssl.trust: "*"
      mail.smtp.connectiontimeout: 10000
      mail.smtp.timeout: 10000
      mail.smtp.writetimeout: 10000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
            scope: openid,email,profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

app:
  mail:
    from: ${MAIL_FROM:noreply@trayecto.app}
    app-url: ${APP_URL:http://localhost:3000}
    # "smtp" (default, usa JavaMailSender con Brevo/Gmail) o "resend" (HTTP API).
    # Render free bloquea puertos SMTP outbound → en prod usar "resend".
    provider: ${APP_MAIL_PROVIDER:smtp}
    resend-api-key: ${RESEND_API_KEY:}
  recaptcha:
    secret-key: ${RECAPTCHA_SECRET_KEY:}
    min-score: ${RECAPTCHA_MIN_SCORE:0.5}

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      # `always` muestra los components (db/mail/diskSpace/etc.) en /actuator/health.
      # No expone secretos — solo statuses UP/DOWN + mensajes técnicos. Útil para
      # diagnóstico rápido en prod sin tener que autenticarse.
      show-details: always
      show-components: always

server:
  port: ${PORT:8080}
  shutdown: graceful

logging:
  level:
    root: INFO
    com.trayecto: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/trayecto_dev}
    username: ${DATABASE_USER:trayecto}
    password: ${DATABASE_PASSWORD:trayecto}
  flyway:
    enabled: true
    locations: classpath:db/migration/common,classpath:db/migration/iam,classpath:db/migration/trips,classpath:db/migration/sharing,classpath:db/migration/notifications,classpath:db/migration/analytics
    out-of-order: true  # módulos pueden agregar migrations con versiones entremezcladas
  jpa:
    hibernate:
      ddl-auto: none

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-not-for-production-please-set-via-env}
    access-ttl-seconds: ${JWT_ACCESS_TTL:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL:2592000}

---
spring:
  config:
    activate:
      on-profile: prod
  # Lazy init: Spring solo instancia beans cuando se llaman por primera vez.
  # Reduce el footprint del bootstrap en ~80-120MB. Trade-off: el primer
  # request a un endpoint nunca usado va a tardar ~200ms extra mientras se
  # construye la cadena de beans. Para Render free (512MB) es necesario.
  main:
    lazy-initialization: true
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    hikari:
      # Pool más conservador para Render free + Neon free (que pausa tras
      # 5 min). 3 conexiones máx, 0 idle = libera cuando no hay tráfico.
      maximum-pool-size: 3
      minimum-idle: 0
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 60000
      max-lifetime: 900000
      connection-test-query: SELECT 1
  flyway:
    enabled: true
    locations: classpath:db/migration/common,classpath:db/migration/iam,classpath:db/migration/trips,classpath:db/migration/sharing,classpath:db/migration/notifications,classpath:db/migration/analytics
  jpa:
    hibernate:
      ddl-auto: validate
  mail:
    host: ${BREVO_SMTP_HOST}
    port: ${BREVO_SMTP_PORT}
    username: ${BREVO_SMTP_USER}
    password: ${BREVO_SMTP_KEY}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript

logging:
  level:
    root: INFO
    com.trayecto: INFO
    org.springframework.security: WARN

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${JWT_SECRET}
    access-ttl-seconds: ${JWT_ACCESS_TTL:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL:2592000}
  recaptcha:
    secret-key: ${RECAPTCHA_SECRET_KEY}
    min-score: 0.5
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    upload-preset: ${CLOUDINARY_UPLOAD_PRESET:trayecto_odometer}
  ocr:
    google-credentials-base64: ${GOOGLE_APPLICATION_CREDENTIALS_JSON:}
    monthly-quota-per-user: 50
